version: "3.9"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: cognistream-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: cognistream
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cognistream-backend
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      CLICKHOUSE_DB: cognistream
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      clickhouse:
        condition: service_healthy
    # Creates tables (idempotent) then starts the API. Run the CSV import
    # separately the first time — see README "Getting Started".
    command: >
      sh -c "python -m app.scripts.create_tables &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: cognistream-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  clickhouse_data:
